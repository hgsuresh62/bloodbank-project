{% extends "base.html" %}
{% block content %}

<div style="max-width:400px; margin:auto;">

<h2>✏ Edit Hospital</h2>

<form method="POST">

<label>Hospital Name</label>
<input type="text" name="name"
value="{{ hospital[1] }}"
required
style="width:100%; padding:10px; margin-bottom:15px;">

<label>Location</label>
<input type="text" name="location"
value="{{ hospital[2] }}"
required
style="width:100%; padding:10px; margin-bottom:15px;">

<label>Phone</label>
<input type="text" name="phone"
value="{{ hospital[3] }}"
required
style="width:100%; padding:10px; margin-bottom:15px;">

<button type="submit"
style="padding:10px 18px; width:100%;">
Update Hospital
</button>

</form>

</div>

{% endblock %}
