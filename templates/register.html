{% extends "base.html" %}
{% block content %}

<style>

body {
    background: #f5f7fa;
}

/* Main Container */
.register-container {
    display: flex;
    min-height: 90vh;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    margin: 40px;
}

/* LEFT SIDE */
.register-left {
    flex: 1;
    background: linear-gradient(rgba(40,0,0,0.75), rgba(80,0,0,0.75)),
                url("{{ url_for('static', filename='blood-bg.jpg') }}");
    background-size: cover;
    background-position: center;
    color: white;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.register-left h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

.register-left p {
    font-size: 18px;
    line-height: 1.6;
}

/* RIGHT SIDE */
.register-right {
    flex: 1;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.register-right h2 {
    margin-bottom: 25px;
}

/* Inputs */
.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

/* Button */
.register-btn {
    background: linear-gradient(90deg, #d90429, #9d0208);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
}

.register-btn:hover {
    opacity: 0.9;
}

/* Login link */
.login-link {
    margin-top: 15px;
    text-align: center;
}

.login-link a {
    color: #d90429;
    font-weight: bold;
    text-decoration: none;
}

.login-link a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 900px) {
    .register-container {
        flex-direction: column;
        margin: 10px;
    }
}

</style>

<div class="register-container">

    <!-- LEFT SIDE -->
    <div class="register-left">
        <h1>Create Account</h1>
        <p>
            Join our Blood Bank Management System and help save lives
            through better donation management.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="register-right">
        <h2>Register</h2>

        <form method="POST" action="{{ url_for('register') }}">

            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <!-- Role automatically set to USER -->
            <input type="hidden" name="role" value="user">

            <button type="submit" class="register-btn">Create Account</button>

        </form>

        <div class="login-link">
            <p>
                Already have an account?
                <a href="{{ url_for('login') }}">Login here</a>
            </p>
        </div>

    </div>

</div>

{% endblock %}
