<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Hospital</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(to right,#e3f2fd,#fce4ec);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:35px;
    border-radius:18px;
    width:380px;
    box-shadow:0px 5px 25px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:18px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background: linear-gradient(to right,#ff6f00,#ff8f00);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#444;
}

</style>

</head>

<body>

<div class="card">

<h2>🏥 Add Hospital</h2>

<form method="POST">

<label>Hospital Name</label>
<input type="text" name="name" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Phone</label>
<input type="text" name="phone" required>

<button type="submit">➕ Add Hospital</button>

</form>

<a href="/hospitals" class="back">⬅ Back to Hospitals</a>

</div>

</body>
</html>
