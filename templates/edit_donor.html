{% extends "base.html" %}
{% block content %}

<h3>Edit Donor</h3>

<form method="POST">

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ donor[1] }}" required>
    </div>

    <div class="mb-3">
        <label>Blood Group</label>
        <input type="text" name="blood_group" class="form-control" value="{{ donor[4] }}" required>
    </div>

    <div class="mb-3">
        <label>Contact</label>
        <input type="text" name="contact" class="form-control" value="{{ donor[6] }}" required>
    </div>

    <button type="submit" class="btn btn-success">Update</button>

</form>

{% endblock %}
